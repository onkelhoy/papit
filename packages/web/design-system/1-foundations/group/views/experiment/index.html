<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group | experiment</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />

    <script defer type="module" src="main.js"></script>
</head>

<body>
    <!-- <pap-card>
        <pap-typography slot="header" variant="h4">Experiment</pap-typography>
        <pap-codeblock display="both">
            <pap-group></pap-group>
        </pap-codeblock>
    </pap-card> -->

    <h1>Experiment</h1>

    <section>
        <h1>Default</h1>
        <pap-codeblock>

            <pap-group>
                <button>BTN 1</button>
                <button>BTN 2</button>
                <button>BTN 3</button>
            </pap-group>
        </pap-codeblock>
    </section>

    <section>
        <h1>aria-orientation</h1>
        <pap-codeblock>
            <pap-group aria-orientation="vertical" class="col">
                <span>
                    <button>BTN 4</button>
                </span>
                <span>
                    <button>BTN 5</button>
                </span>
                <span>
                    <button>BTN 6</button>
                </span>
            </pap-group>
        </pap-codeblock>
    </section>


    <section>
        <h1>List Elements</h1>
        <pap-codeblock>
            <pap-group aria-orientation="vertical" class="col">
                <ul>
                    <li tabindex="0">LI 1</li>
                    <li tabindex="0">LI 2</li>
                    <li tabindex="0">
                        LI 3
                        <ul>
                            <li tabindex="0">LI 1</li>
                            <li tabindex="0">LI 2</li>
                            <li tabindex="0">LI 3</li>
                            <li tabindex="0">LI 4</li>
                            <li tabindex="0">LI 5</li>
                            <li tabindex="0">LI 6</li>
                            <li tabindex="0">LI 7</li>
                        </ul>
                    </li>
                    <li tabindex="0">LI 4</li>
                    <li tabindex="0">LI 5</li>
                    <li tabindex="0">LI 6</li>
                    <li tabindex="0">LI 7</li>
                </ul>
            </pap-group>
        </pap-codeblock>
    </section>

    <section>
        <h1>up left down right</h1>
        <pap-codeblock>

            <pap-group up left down right>
                <button>BTN 7</button>
                <button>BTN 8</button>
                <button>BTN 9</button>
            </pap-group>
        </pap-codeblock>
    </section>
</body>

</html>
