<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooltip | experiment</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />

    <script defer type="module" src="main.js"></script>
</head>

<body>
    <h1>Experiment</h1>

    <section>
        <h2>Simple Example</h2>
        <pap-codeblock>
            <pap-tooltip>
                <button slot="target">Target</button>
                Hello im a tooltip
            </pap-tooltip>
        </pap-codeblock>
    </section>

    <section>
        <h2>Simple Example</h2>
        <pap-codeblock>
            <pap-tooltip placement="right">
                <button slot="target">Target</button>
                Hello im a <strong>tooltip</strong> with some html
            </pap-tooltip>
        </pap-codeblock>
    </section>
</body>

</html>
