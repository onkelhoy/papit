<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuitem | experiment</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />

    <script defer type="module" src="main.js"></script>
</head>

<body>
    <h1>Experiment</h1>

    <section>
        <h2>Simple Example</h2>
        <pap-menuitem>menu item 1</pap-menuitem>
    </section>

    <section>
        <h2>HTML Example</h2>

        <pap-codeblock>
            <pap-menuitem>
                <div>
                    <strong>HTML</strong>
                    <span>very cool</span>
                </div>
            </pap-menuitem>
        </pap-codeblock>
    </section>

    <section>
        <h2>Menu Example</h2>
        <pap-codeblock>
            <pap-menuitem>
                <div>
                    <strong>HTML</strong>
                    <span>very cool</span>
                </div>
                <pap-menu>
                    <pap-menuitem>menu item 2</pap-menuitem>
                    <pap-menuitem>menu item 3</pap-menuitem>
                    <pap-menuitem>menu item 4</pap-menuitem>
                    <pap-menuitem>menu item 5</pap-menuitem>
                </pap-menu>
            </pap-menuitem>
        </pap-codeblock>
    </section>
</body>

</html>
