<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch | experiment</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />

    <script defer type="module" src="main.js"></script>
</head>

<body>
    <h1>Experiment</h1>

    <section>
        <h2>Form Example</h2>

        <pap-codeblock>
            <form>
                <div>
                    <div>
                        <label for="a">Switch A</label>
                        <pap-switch defaultChecked id="a" name="a"></pap-switch>
                    </div>
                    <div>
                        <label for="b">Switch B</label>
                        <pap-switch id="b" name="b"></pap-switch>
                    </div>
                </div>
                <button type="reset">reset</button>
                <button type="submit">submit</button>
            </form>
        </pap-codeblock>
    </section>
</body>

</html>
