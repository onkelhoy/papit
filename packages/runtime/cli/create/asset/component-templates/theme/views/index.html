<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VARIABLE_CLASS_NAME | experiment</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="style.css" />

  <script defer src="main.js"></script>
</head>

<body>
    <template>
        <section class="showcase-section">
            <h2 class="showcase-title">Brand</h2>
            <div class="swatch-row">
                <div class="swatch swatch--primary"><span class="swatch-label">--primary</span></div>
                <div class="swatch swatch--secondary"><span class="swatch-label">--secondary</span></div>
                <div class="swatch swatch--tertiary"><span class="swatch-label">--tertiary</span></div>
            </div>
        </section>
    
        <section class="showcase-section">
            <h2 class="showcase-title">Semantic</h2>
            <div class="swatch-row">
                <div class="swatch swatch--success"><span class="swatch-label">--success</span></div>
                <div class="swatch swatch--info"><span class="swatch-label">--info</span></div>
                <div class="swatch swatch--warning"><span class="swatch-label">--warning</span></div>
                <div class="swatch swatch--error"><span class="swatch-label">--error</span></div>
            </div>
        </section>
    
        <section class="showcase-section">
            <h2 class="showcase-title">Background</h2>
            <div class="swatch-row">
                <div class="swatch swatch--background-lightest"><span class="swatch-label">--background-lightest</span></div>
                <div class="swatch swatch--background-lighter"><span class="swatch-label">--background-lighter</span></div>
                <div class="swatch swatch--background-light"><span class="swatch-label">--background-light</span></div>
                <div class="swatch swatch--background"><span class="swatch-label">--background</span></div>
                <div class="swatch swatch--background-dark"><span class="swatch-label">--background-dark</span></div>
                <div class="swatch swatch--background-darker"><span class="swatch-label">--background-darker</span></div>
                <div class="swatch swatch--background-darkest"><span class="swatch-label">--background-darkest</span></div>
            </div>
        </section>
    
        <section class="showcase-section">
            <h2 class="showcase-title">Foreground</h2>
            <div class="swatch-row">
                <div class="swatch swatch--foreground-lightest"><span class="swatch-label">--foreground-lightest</span></div>
                <div class="swatch swatch--foreground-lighter"><span class="swatch-label">--foreground-lighter</span></div>
                <div class="swatch swatch--foreground-light"><span class="swatch-label">--foreground-light</span></div>
                <div class="swatch swatch--foreground"><span class="swatch-label">--foreground</span></div>
                <div class="swatch swatch--foreground-dark"><span class="swatch-label">--foreground-dark</span></div>
                <div class="swatch swatch--foreground-darker"><span class="swatch-label">--foreground-darker</span></div>
                <div class="swatch swatch--foreground-darkest"><span class="swatch-label">--foreground-darkest</span></div>
            </div>
        </section>
    
        <section class="showcase-section">
            <h2 class="showcase-title">Spacing</h2>
            <div class="space-list">
                <div class="space-item space-item--1"><span class="space-label">--space-1</span></div>
                <div class="space-item space-item--2"><span class="space-label">--space-2</span></div>
                <div class="space-item space-item--3"><span class="space-label">--space-3</span></div>
                <div class="space-item space-item--4"><span class="space-label">--space-4</span></div>
                <div class="space-item space-item--5"><span class="space-label">--space-5</span></div>
                <div class="space-item space-item--6"><span class="space-label">--space-6</span></div>
                <div class="space-item space-item--7"><span class="space-label">--space-7</span></div>
                <div class="space-item space-item--8"><span class="space-label">--space-8</span></div>
                <div class="space-item space-item--9"><span class="space-label">--space-9</span></div>
                <div class="space-item space-item--10"><span class="space-label">--space-10</span></div>
                <div class="space-item space-item--12"><span class="space-label">--space-12</span></div>
                <div class="space-item space-item--16"><span class="space-label">--space-16</span></div>
                <div class="space-item space-item--20"><span class="space-label">--space-20</span></div>
            </div>
        </section>
    
        <section class="showcase-section">
            <h2 class="showcase-title">Radius</h2>
            <div class="swatch-row">
                <div class="radius-item radius-item--small"><span class="radius-label">--radius-small</span></div>
                <div class="radius-item radius-item--medium"><span class="radius-label">--radius-medium</span></div>
                <div class="radius-item radius-item--large"><span class="radius-label">--radius-large</span></div>
                <div class="radius-item radius-item--full"><span class="radius-label">--radius-full</span></div>
            </div>
        </section>
    </template>


    <select>
        <option value="system">system</option>
        <option value="light">light</option>
        <option value="dark">dark</option>
    </select>
    
    <div data-template>placeholder-becuase-my-html-parser-has-limits</div>

    <div class="theme-opposite">
        <div data-template>placeholder-becuase-my-html-parser-has-limits</div>
    </div>
</body>

</html>
