name: Initialise Packages

on:
  workflow_call:
    inputs:
      force_build:
        description: 'Force build?'
        required: false
        default: false
        type: boolean 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

        # setup node
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

        # caching: node_modules
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: 'node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-modules-

        # caching: package builds
      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: packages/**/lib
          key: ${{ runner.os }}-build
          restore-keys: ${{ runner.os }}-build
      
      # install packages to make sure they are propperly added to node_modules
      - name: Clean Install 
        run: npm ci 

      - name: (pre) build 
        id: prebuild 
        env: 
          CI: true 
        run: |
          if npm pkg get scripts.prebuild >/dev/null 2>&1; then
            npm run prebuild &> /dev/null
          fi

      - name: build
        id: build
        env:
          FORCE: ${{ inputs.force_build || false }}
        run: npm run build -- --ci --remote 

      - name: Final install
        run: npm install
